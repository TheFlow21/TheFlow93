name: Verify Human Identity

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: 'Agent Name'
        required: true
        default: 'TheFlow93'
      agent_description:
        description: 'Agent Description'
        required: true
        default: 'AI Agent'

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Debug structure
        run: ls -R

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install ClawHub skill
        run: npx --yes clawhub@latest install verified-agent-identity

      - name: Install dependencies (if scripts exist)
        run: |
          if [ -d "scripts" ]; then
            cd scripts
            npm install
          else
            echo "Folder scripts tidak ditemukan, skip install"
          fi

      - name: Create new Ethereum Identity
        run: |
          if [ -f "scripts/createNewEthereumIdentity.js" ]; then
            node scripts/createNewEthereumIdentity.js
          else
            echo "File createNewEthereumIdentity.js tidak ditemukan"
            exit 1
          fi

      - name: Link Human to Agent
        run: |
          if [ -f "scripts/manualLinkHumanToAgent.js" ]; then
            node scripts/manualLinkHumanToAgent.js \
            --challenge "{\"name\": \"${{ github.event.inputs.agent_name }}\", \"description\": \"${{ github.event.inputs.agent_description }}\"}"
          else
            echo "File manualLinkHumanToAgent.js tidak ditemukan"
            exit 1
          fi
